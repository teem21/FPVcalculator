<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3;
  --bg2: #eeecea;
  --surface: #ffffff;
  --surface2: #f3f2ef;
  --border: #dddbd6;
  --border2: #c8c5be;
  --text: #1a1a18;
  --text2: #6b6860;
  --text3: #a8a59e;
  --accent: #1a3a5c;
  --accent-lt: #e8eef5;
  --accent-mid: rgba(26,58,92,0.12);
  --green: #1a6b3c;
  --green-lt: #e8f5ee;
  --orange: #c45c00;
  --orange-lt: #fef3e8;
  --red: #b83232;
  --red-lt: #fdeaea;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --r: 10px; --r-sm: 6px; --r-lg: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LANG BAR ── */
.lang-bar {
  background: var(--accent); padding: 8px 20px;
  display: flex; align-items: center; gap: 6px; justify-content: flex-end;
}
.lang-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 10px;
  border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
  background: transparent; color: rgba(255,255,255,0.6);
  cursor: pointer; transition: all 0.15s;
}
.lang-btn.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.4); }

/* ── LAYOUT ── */
.app { display: grid; grid-template-columns: 1fr 360px; min-height: calc(100vh - 37px); }
.main { padding: 2rem; overflow-y: auto; }
.sidebar {
  background: var(--surface); border-left: 1px solid var(--border);
  position: sticky; top: 0; height: calc(100vh - 37px);
  overflow-y: auto; display: flex; flex-direction: column;
  padding: 1.5rem;
}

/* ── HEADER ── */
.header { margin-bottom: 1.5rem; }
.logo { font-family: var(--mono); font-size: 12px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 6px; }
h1 { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1.2; }
.header-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* ── CONTROLS ── */
.controls-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 16px;
  display: flex; flex-wrap: wrap; gap: 10px 20px;
  align-items: center; margin-bottom: 1rem; box-shadow: var(--shadow);
}
.ctrl-field { display: flex; align-items: center; gap: 7px; }
.ctrl-field label { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }
.ctrl-field input {
  width: 74px; font-size: 12px; font-family: var(--mono);
  border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 5px 8px; background: var(--bg); color: var(--text); outline: none;
}
.ctrl-field input:focus { border-color: var(--accent); }
.ctrl-sep { width: 1px; height: 18px; background: var(--border); }

.tier-row { display: flex; gap: 4px; margin-bottom: 1.25rem; }
.tier-btn {
  flex: 1; font-size: 12px; font-family: var(--mono);
  padding: 8px 6px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); cursor: pointer; transition: all 0.15s; text-align: center;
}
.tier-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tier-btn:hover:not(.active) { background: var(--bg2); }

/* ── CONFIGS TABS ── */
.configs-bar {
  display: flex; gap: 6px; align-items: center;
  margin-bottom: 1.25rem; flex-wrap: wrap;
}
.cfg-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; transition: all 0.15s; font-size: 13px; color: var(--text2);
}
.cfg-tab.active { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); font-weight: 500; }
.cfg-tab .cfg-close {
  font-size: 14px; color: var(--text3); line-height: 1;
  margin-left: 2px; padding: 0 2px; border-radius: 3px;
}
.cfg-tab .cfg-close:hover { background: var(--border); color: var(--red); }
.cfg-add {
  padding: 7px 12px; border-radius: var(--r-sm);
  border: 1px dashed var(--border2); background: transparent;
  color: var(--text3); cursor: pointer; font-size: 13px;
  transition: all 0.15s;
}
.cfg-add:hover { border-color: var(--accent); color: var(--accent); }

/* ── MODEL CARD ── */
.model-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); margin-bottom: 10px;
  box-shadow: var(--shadow); overflow: hidden; transition: border-color 0.2s;
}
.model-card.active { border-color: var(--accent); }
.model-top {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 14px; align-items: center; padding: 16px 18px;
}
.model-badge {
  width: 52px; height: 52px; background: var(--accent);
  border-radius: var(--r-sm); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 700; color: #fff; flex-shrink: 0;
}
.model-badge .m-name { font-size: 18px; line-height: 1; }
.model-badge .m-size { font-size: 10px; color: rgba(255,255,255,0.6); }
.model-info .model-title { font-size: 15px; font-weight: 600; }
.model-info .model-sub { font-size: 11px; color: var(--text3); margin-top: 3px; line-height: 1.5; }
.model-qty { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.qty-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; line-height: 1; flex-shrink: 0;
}
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-input {
  width: 58px; text-align: center; font-family: var(--mono); font-size: 16px;
  font-weight: 700; border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 5px; background: var(--bg); color: var(--text); outline: none;
}
.qty-input:focus { border-color: var(--accent); }

/* ── COMP SECTIONS ── */
.comp-area { padding: 0 18px 16px; display: flex; flex-direction: column; gap: 14px; }
.comp-sec-title {
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3);
  margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
}
.comp-sec-title::after { content:''; flex:1; height:1px; background: var(--border); }
.comp-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 11px; border-radius: var(--r-sm);
  border: 1px solid transparent; cursor: pointer; transition: all 0.15s;
}
.comp-item:hover { background: var(--bg); border-color: var(--border); }
.comp-item.selected { background: var(--accent-lt); border-color: rgba(26,58,92,0.3); }
.comp-indicator {
  width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
  border: 2px solid var(--border2); transition: all 0.15s;
}
.comp-indicator.check { border-radius: 4px; }
.comp-item.selected .comp-indicator { background: var(--accent); border-color: var(--accent); }
.comp-item-body { flex: 1; min-width: 0; }
.comp-item-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.comp-item-sub { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
.comp-item-price { font-family: var(--mono); font-size: 12px; color: var(--text2); white-space: nowrap; margin-top: 2px; flex-shrink: 0; text-align: right; }
.comp-item-price.incl { color: var(--text3); font-size: 11px; }
.comp-item-price.tbd { color: var(--orange); font-size: 11px; }

/* Tags */
.tag { display: inline-block; font-size: 9px; font-family: var(--mono); font-weight: 600;
  padding: 2px 5px; border-radius: 3px; vertical-align: middle; }
.tag-ai   { background: var(--green-lt);  color: var(--green); }
.tag-v2   { background: var(--accent-lt); color: var(--accent); }
.tag-top  { background: var(--orange-lt); color: var(--orange); }
.tag-tbd  { background: var(--bg2); color: var(--text3); }

/* ── SIDEBAR ── */
.sidebar-head { font-family: var(--mono); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 12px; }
.sum-scroll { flex: 1; overflow-y: auto; margin: 0 -1rem; padding: 0 1rem; }
.sum-group-label { font-size: 10px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 10px 0 4px; border-top: 1px solid var(--border); margin-top: 6px; }
.sum-group-label:first-child { border-top: none; margin-top: 0; }
.sum-row { display: flex; justify-content: space-between; align-items: baseline;
  gap: 8px; padding: 5px 0; font-size: 12px; }
.sum-name { color: var(--text2); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sum-qty { color: var(--text3); font-family: var(--mono); font-size: 11px; flex-shrink: 0; }
.sum-price { color: var(--text); font-family: var(--mono); font-size: 12px;
  font-weight: 600; flex-shrink: 0; }
.empty-hint { text-align: center; padding: 2rem 0; }
.empty-icon { font-size: 28px; margin-bottom: 8px; }
.empty-txt { font-size: 13px; color: var(--text3); line-height: 1.6; }

.total-card {
  background: var(--accent); border-radius: var(--r);
  padding: 16px; margin-top: 12px; color: #fff;
}
.total-card-label { font-size: 11px; opacity: 0.6; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.total-cny { font-family: var(--mono); font-size: 26px; font-weight: 700;
  letter-spacing: -0.5px; line-height: 1; }
.total-usd { font-size: 13px; opacity: 0.7; margin-top: 5px; }
.total-fob { font-size: 11px; opacity: 0.45; margin-top: 4px; font-family: var(--mono); }

.reset-btn { width: 100%; padding: 9px; border-radius: var(--r-sm); margin-top: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text3); font-size: 12px; cursor: pointer; transition: all 0.15s;
  font-family: var(--mono); }
.reset-btn:hover { border-color: var(--red); color: var(--red); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; bottom: 0; left: 0; right: 0; height: auto;
    max-height: 50vh; border-left: none; border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0; box-shadow: var(--shadow-lg);
    z-index: 100; transform: translateY(calc(100% - 72px));
    transition: transform 0.3s ease; }
  .sidebar.open { transform: translateY(0); }
  .sidebar-toggle {
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; padding-bottom: 12px; margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-toggle-arrow { font-size: 18px; color: var(--text3); }
  .main { padding: 1rem; padding-bottom: 80px; }
  .model-top { grid-template-columns: auto 1fr; gap: 10px; }
  .model-qty { grid-column: 1/-1; padding: 0 2px 4px; }
  .controls-bar { gap: 8px 12px; }
  .comp-item-price { display: none; }
  h1 { font-size: 20px; }
  .tier-btn { font-size: 11px; padding: 7px 4px; }
  .configs-bar { gap: 5px; }
}
@media (min-width: 769px) {
  .sidebar-toggle { display: none; }
  .sidebar.open { transform: none; }
}
</style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ru',this)">RU</button>
  <button class="lang-btn" onclick="setLang('en',this)">EN</button>
  <button class="lang-btn" onclick="setLang('zh',this)">中文</button>
</div>

<div class="app">
<!-- MAIN -->
<div class="main">
  <div class="header">
    <div class="logo">FPV CONFIGURATOR</div>
    <h1 id="t-title">Конфигуратор FPV дронов</h1>
    <p class="header-sub" id="t-sub">Выберите модели, комплектующие и количество — стоимость рассчитывается автоматически</p>
  </div>

  <div class="controls-bar">
    <div class="ctrl-field">
      <label id="t-rate">USD/CNY</label>
      <input type="number" id="rate" value="6.84" step="0.01" min="1">
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-field">
      <label id="t-fob">FOB ×</label>
      <input type="number" id="fob_k" value="1.1" step="0.01" min="1">
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-field">
      <label id="t-xkm">X CNY/км</label>
      <input type="number" id="xkm" value="215" step="1" min="1">
    </div>
  </div>

  <div class="tier-row" id="tier-row"></div>

  <!-- Configs tabs -->
  <div class="configs-bar" id="configs-bar"></div>

  <!-- Model cards -->
  <div id="models-container"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-toggle" onclick="toggleSidebar()">
    <div class="sidebar-head" id="t-summary">Итог заказа</div>
    <div class="sidebar-toggle-arrow" id="sidebar-arrow">▲</div>
  </div>
  <div class="sum-scroll" id="sum-scroll">
    <div class="empty-hint" id="sum-empty">
      <div class="empty-icon">🛸</div>
      <div class="empty-txt" id="t-empty">Выберите модель<br>и комплектующие</div>
    </div>
    <div id="sum-list" style="display:none"></div>
  </div>
  <div class="total-card" id="total-card" style="display:none">
    <div class="total-card-label" id="t-total-lbl">Итого</div>
    <div class="total-cny" id="total-cny">¥0</div>
    <div class="total-usd" id="total-usd">≈ $0 FOB</div>
    <div class="total-fob" id="total-fob"></div>
  </div>
  <button class="reset-btn" id="t-reset" onclick="resetCurrent()">↺ Сбросить</button>
</div>
</div>

<script>
// ── I18N ──────────────────────────────────────────────────────────────────
const LANGS = {
  ru: {
    title: 'Конфигуратор FPV дронов',
    sub: 'Выберите модели, комплектующие и количество — стоимость рассчитывается автоматически',
    rate: 'USD/CNY', fob: 'FOB ×', xkm: 'X CNY/км',
    tiers: ['Образец (1 шт)', 'от 1 000 шт', 'от 5 000 шт'],
    summary: 'Итог заказа', empty: 'Выберите модель\nи комплектующие',
    totalLbl: 'Итого', reset: '↺ Сбросить', addCfg: '+ Конфигурация',
    qty: 'шт', incl: 'включено', tbd: 'уточн.',
    versions: 'Версия дрона', battery: '🔋 Аккумулятор', esc: '⚡ ESC (регулятор)',
    fc: '🧠 Полётный контроллер (FC)', camera: '📷 FPV камера',
    vtx: '📡 Видеопередатчик (VTX)', rx: '📻 Приёмник (RX)',
    tx: '📤 TX-модуль', fiber_gnd: '🔌 Наземная станция (оптика)',
    fiber_len: '📏 Длина оптоволокна/шт', ai: '🤖 AI-модуль (опция)',
    ground: '🎮 Наземное оборудование',
    cfg: 'Конфиг',
  },
  en: {
    title: 'FPV Drone Configurator',
    sub: 'Select models, components and quantities — pricing is calculated automatically',
    rate: 'USD/CNY', fob: 'FOB ×', xkm: 'X CNY/km',
    tiers: ['Sample (1 pc)', 'from 1,000 pcs', 'from 5,000 pcs'],
    summary: 'Order Summary', empty: 'Select a drone model\nand components',
    totalLbl: 'Total', reset: '↺ Reset', addCfg: '+ Configuration',
    qty: 'pcs', incl: 'included', tbd: 'TBD',
    versions: 'Drone version', battery: '🔋 Battery', esc: '⚡ ESC',
    fc: '🧠 Flight controller (FC)', camera: '📷 FPV camera',
    vtx: '📡 Video transmitter (VTX)', rx: '📻 Receiver (RX)',
    tx: '📤 TX module', fiber_gnd: '🔌 Ground station (fiber)',
    fiber_len: '📏 Fiber length/unit', ai: '🤖 AI module (optional)',
    ground: '🎮 Ground equipment',
    cfg: 'Config',
  },
  zh: {
    title: 'FPV无人机配置器',
    sub: '选择机型、配件和数量 — 价格自动计算',
    rate: 'USD/CNY汇率', fob: 'FOB系数', xkm: 'X CNY/公里',
    tiers: ['样品 (1架)', '1,000架起', '5,000架起'],
    summary: '订单合计', empty: '请选择无人机型号\n和配件',
    totalLbl: '合计', reset: '↺ 重置', addCfg: '+ 新配置',
    qty: '架', incl: '已含', tbd: '待确认',
    versions: '无人机版本', battery: '🔋 电池', esc: '⚡ 电调 (ESC)',
    fc: '🧠 飞控 (FC)', camera: '📷 FPV摄像头',
    vtx: '📡 视频传输 (VTX)', rx: '📻 接收机 (RX)',
    tx: '📤 TX模块', fiber_gnd: '🔌 地面站 (光纤)',
    fiber_len: '📏 光纤长度/架', ai: '🤖 AI模块 (选配)',
    ground: '🎮 地面设备',
    cfg: '配置',
  },
};

let lang = 'ru';
function L(k) { return LANGS[lang][k] || k; }

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.lang = l;
  renderAll();
}

// ── State ──────────────────────────────────────────────────────────────────
let tier = 0;
let sidebarOpen = false;

// Multi-config state
let configs = [{ id: 1, modelQtys: { F10:0, F13:0, F15:0 }, selections: {} }];
let activeConfig = 1;
let nextCfgId = 2;

function getCfg() { return configs.find(c => c.id === activeConfig); }

const getRate = () => parseFloat(document.getElementById('rate').value) || 6.84;
const getFob  = () => parseFloat(document.getElementById('fob_k').value) || 1.10;
const getXkm  = () => parseFloat(document.getElementById('xkm').value) || 215;
const fiber   = km => Math.round(getXkm() * km * 1.2);
const fibBase = km => Math.round(getXkm() * km);
const fibLow  = km => Math.round(getXkm() * km * 0.98);
function tp(prices) { return prices ? prices[tier] : null; }

// ── Data ───────────────────────────────────────────────────────────────────
function getModels() {
  const r = getRate(), k = getFob();
  const f722   = tier === 0 ? Math.round(26*r/k) : (tier === 1 ? Math.round(23*r/k) : Math.round(23*r/k));
  const gemini = Math.round(26.5*r/k);
  const cobra  = Math.round(220*r/k);
  const dji_o4 = tier === 0 ? Math.round(208*r/k) : (tier === 1 ? Math.round(208*r/k) : Math.round(208*r/k));

  const names = {
    ru: { std:'Стандарт RF', fib:'Оптоволоконная',
      std_sub:'5.8G радиоканал · ELRS 915 в комплекте', fib_sub:'Встроенный оптоволоконный модуль',
      f10sub:'F405 · ESC 60A · 3115 900KV · 10×5×3 · VTX 5.8G 3W · 10км/ч–140км/ч · 2.5кг',
      f13sub:'F405 · ESC 80A · 4214 440KV · 13×10×3 · VTX 5.8G 4W · 150км/ч · 4кг',
      f15sub:'F405 · ESC 100A · 4315 375KV · 15×7×3 · VTX 5.8G 4W · 170км/ч · 7кг',
    },
    en: { std:'Standard RF', fib:'Fiber optic',
      std_sub:'5.8G RF · ELRS 915 included', fib_sub:'Built-in fiber optic module',
      f10sub:'F405 · ESC 60A · 3115 900KV · 10×5×3 · VTX 5.8G 3W · max 140km/h · 2.5kg',
      f13sub:'F405 · ESC 80A · 4214 440KV · 13×10×3 · VTX 5.8G 4W · 150km/h · 4kg',
      f15sub:'F405 · ESC 100A · 4315 375KV · 15×7×3 · VTX 5.8G 4W · 170km/h · 7kg',
    },
    zh: { std:'标准RF版', fib:'光纤版',
      std_sub:'5.8G无线电 · 含ELRS 915接收机', fib_sub:'内置光纤通讯模块',
      f10sub:'F405飞控 · ESC 60A · 3115 900KV · 10×5×3 · VTX 5.8G 3W · 最高140km/h · 负载2.5kg',
      f13sub:'F405飞控 · ESC 80A · 4214 440KV · 13×10×3 · VTX 5.8G 4W · 150km/h · 负载4kg',
      f15sub:'F405飞控 · ESC 100A · 4315 375KV · 15×7×3 · VTX 5.8G 4W · 170km/h · 负载7kg',
    },
  };
  const n = names[lang];

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  // Update static text
  document.getElementById('t-title').textContent = L('title');
  document.getElementById('t-sub').textContent   = L('sub');
  document.getElementById('t-rate').textContent  = L('rate');
  document.getElementById('t-fob').textContent   = L('fob');
  document.getElementById('t-xkm').textContent   = L('xkm');
  document.getElementById('t-summary').textContent = L('summary');
  document.getElementById('t-empty').innerHTML   = L('empty').replace('\n','<br>');
  document.getElementById('t-total-lbl').textContent = L('totalLbl');
  document.getElementById('t-reset').textContent = L('reset');

  // Tier buttons
  const tr = document.getElementById('tier-row');
  tr.innerHTML = '';
  L('tiers').forEach((t,i) => {
    const b = document.createElement('button');
    b.className = 'tier-btn' + (tier===i?' active':'');
    b.textContent = t;
    b.onclick = () => setTier(i, b);
    tr.appendChild(b);
  });

  // Config tabs
  renderConfigTabs();

  // Model cards
  const models = getModels();
  const cfg = getCfg();
  const container = document.getElementById('models-container');
  container.innerHTML = '';

  Object.entries(models).forEach(([key, model]) => {
    // Init selections
    if (!cfg.selections[key]) {
      cfg.selections[key] = { version: model.versions[0].id };
      model.components.forEach(sec => {
        sec.items.forEach(it => { if(it.default) cfg.selections[key][it.id] = true; });
      });
    }
    const qty = cfg.modelQtys[key] || 0;
    const sel = cfg.selections[key];
    const ver = model.versions.find(v => v.id === sel.version) || model.versions[0];

    const card = document.createElement('div');
    card.className = 'model-card' + (qty > 0 ? ' active' : '');

    // Top
    const top = document.createElement('div');
    top.className = 'model-top';
    top.innerHTML = `
      <div class="model-badge"><div class="m-name">${model.label}</div><div class="m-size">${model.size}</div></div>
      <div class="model-info">
        <div class="model-title">${model.label} ${ver.name}</div>
        <div class="model-sub">${model.sub}</div>
      </div>
      <div class="model-qty">
        <button class="qty-btn" onclick="changeQty('${key}',-1,'${cfg.id}')">−</button>
        <input class="qty-input" type="number" min="0" value="${qty}"
          id="qty-${cfg.id}-${key}"
          oninput="setQty('${key}',this.value,'${cfg.id}')">
        <button class="qty-btn" onclick="changeQty('${key}',1,'${cfg.id}')">+</button>
      </div>
    `;
    card.appendChild(top);

    if (qty > 0) {
      const area = document.createElement('div');
      area.className = 'comp-area';

      // Version radio
      const vSec = document.createElement('div');
      vSec.innerHTML = `<div class="comp-sec-title">${L('versions')}<span style="flex:0"></span></div>`;
      const vsTitle = vSec.querySelector('.comp-sec-title');
      vsTitle.style.cssText='font-size:10px;font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;';
      const vsLine = document.createElement('span');
      vsLine.style.cssText='flex:1;height:1px;background:var(--border);';
      vsTitle.appendChild(vsLine);

      model.versions.forEach(ver2 => {
        const isSel = sel.version === ver2.id;
        const row = mkCompRow({
          name: ver2.name, sub: ver2.sub,
          prices: ver2.prices, type:'radio', selected: isSel,
        });
        row.onclick = () => { sel.version = ver2.id; renderAll(); recalc(); };
        vSec.appendChild(row);
      });
      area.appendChild(vSec);

      // Component sections
      model.components.forEach(sec => {
        const secEl = document.createElement('div');
        const t = document.createElement('div');
        t.style.cssText='font-size:10px;font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;';
        t.textContent = sec.title;
        const line = document.createElement('span');
        line.style.cssText='flex:1;height:1px;background:var(--border);';
        t.appendChild(line);
        secEl.appendChild(t);

        sec.items.forEach(it => {
          const isSel = !!sel[it.id];
          const row = mkCompRow({...it, type: sec.type, selected: isSel});
          row.onclick = () => {
            if (sec.type === 'radio') {
              sec.items.forEach(i => delete sel[i.id]);
              sel[it.id] = true;
            } else {
              if(sel[it.id]) delete sel[it.id]; else sel[it.id] = true;
            }
            renderAll(); recalc();
          };
          secEl.appendChild(row);
        });
        area.appendChild(secEl);
      });

      card.appendChild(area);
    }

    container.appendChild(card);
  });

  recalc();
}

function mkCompRow({name, sub, prices, type, selected, incl, tbd, tag}) {
  const row = document.createElement('div');
  row.className = 'comp-item' + (selected ? ' selected' : '');

  const ind = document.createElement('div');
  ind.className = 'comp-indicator' + (type==='check'?' check':'');
  row.appendChild(ind);

  const body = document.createElement('div');
  body.className = 'comp-item-body';
  const tagHtml = tag==='ai' ? '<span class="tag tag-ai">AI</span>'
                : tag==='v2' ? '<span class="tag tag-v2">V2</span>'
                : tag==='top'? '<span class="tag tag-top">TOP★</span>' : '';
  body.innerHTML = `<div class="comp-item-name">${name}${tagHtml}</div><div class="comp-item-sub">${sub}</div>`;
  row.appendChild(body);

  const priceEl = document.createElement('div');
  if (incl) { priceEl.className='comp-item-price incl'; priceEl.textContent=L('incl'); }
  else if (tbd) { priceEl.className='comp-item-price tbd'; priceEl.textContent=L('tbd'); }
  else if (prices) { priceEl.className='comp-item-price'; priceEl.textContent='¥'+tp(prices).toLocaleString(); }
  row.appendChild(priceEl);

  return row;
}

// ── Config tabs ────────────────────────────────────────────────────────────
function renderConfigTabs() {
  const bar = document.getElementById('configs-bar');
  bar.innerHTML = '';
  configs.forEach(cfg => {
    const tab = document.createElement('div');
    tab.className = 'cfg-tab' + (cfg.id===activeConfig?' active':'');
    const totalQty = Object.values(cfg.modelQtys).reduce((a,b)=>a+(b||0),0);
    tab.innerHTML = `
      <span>${L('cfg')} ${cfg.id}${totalQty?' ('+totalQty+' '+L('qty')+')':''}</span>
      ${configs.length>1 ? `<span class="cfg-close" onclick="removeCfg(${cfg.id},event)">×</span>`:''}
    `;
    tab.onclick = () => { activeConfig = cfg.id; renderAll(); };
    bar.appendChild(tab);
  });
  const add = document.createElement('button');
  add.className = 'cfg-add';
  add.textContent = L('addCfg');
  add.onclick = addConfig;
  bar.appendChild(add);
}

function addConfig() {
  const id = nextCfgId++;
  configs.push({ id, modelQtys:{F10:0,F13:0,F15:0}, selections:{} });
  activeConfig = id;
  renderAll();
}

function removeCfg(id, e) {
  e.stopPropagation();
  configs = configs.filter(c => c.id !== id);
  if (activeConfig === id) activeConfig = configs[0].id;
  renderAll();
}

// ── Qty ────────────────────────────────────────────────────────────────────
function changeQty(key, delta, cfgId) {
  const cfg = configs.find(c => c.id == cfgId);
  cfg.modelQtys[key] = Math.max(0, (cfg.modelQtys[key]||0) + delta);
  const inp = document.getElementById(`qty-${cfgId}-${key}`);
  if(inp) inp.value = cfg.modelQtys[key];
  renderAll();
}
function setQty(key, val, cfgId) {
  const cfg = configs.find(c => c.id == cfgId);
  const n = parseInt(val);
  cfg.modelQtys[key] = isNaN(n)||n<0 ? 0 : n;
  renderAll();
}

// ── Recalc ─────────────────────────────────────────────────────────────────
function recalc() {
  const models = getModels();
  const r = getRate(), k = getFob();
  let grand = 0;
  const sumItems = [];
  let hasAny = false;

  configs.forEach(cfg => {
    const cfgItems = [];
    let cfgTotal = 0;
    Object.entries(models).forEach(([key, model]) => {
      const qty = cfg.modelQtys[key]||0;
      if(!qty) return;
      hasAny = true;
      const sel = cfg.selections[key]||{};
      const ver = model.versions.find(v=>v.id===sel.version)||model.versions[0];
      const bp = tp(ver.prices)||0;
      const dt = bp*qty; cfgTotal+=dt; grand+=dt;
      cfgItems.push({name: model.label+' '+ver.name, qty, price:dt});

      model.components.forEach(sec => {
        sec.items.forEach(it => {
          if(!sel[it.id]) return;
          if(it.incl||it.tbd||!it.prices) return;
          const up = tp(it.prices); if(!up) return;
          const tot = up*qty; cfgTotal+=tot; grand+=tot;
          cfgItems.push({name:it.name, qty, price:tot});
        });
      });
    });
    if(cfgItems.length) sumItems.push({group:`${L('cfg')} ${cfg.id}`, items:cfgItems, total:cfgTotal});
  });

  const sumEmpty = document.getElementById('sum-empty');
  const sumList  = document.getElementById('sum-list');
  const totalCard= document.getElementById('total-card');

  if(!hasAny) {
    sumEmpty.style.display='block'; sumList.style.display='none'; totalCard.style.display='none'; return;
  }
  sumEmpty.style.display='none'; sumList.style.display='block'; totalCard.style.display='block';

  sumList.innerHTML='';
  sumItems.forEach(g => {
    const gl = document.createElement('div'); gl.className='sum-group-label'; gl.textContent=g.group;
    sumList.appendChild(gl);
    g.items.forEach(it => {
      const row = document.createElement('div'); row.className='sum-row';
      row.innerHTML=`<span class="sum-name">${it.name}</span><span class="sum-qty">×${it.qty}</span><span class="sum-price">¥${it.price.toLocaleString()}</span>`;
      sumList.appendChild(row);
    });
    if(sumItems.length>1){
      const st=document.createElement('div'); st.className='sum-row';
      st.style.borderTop='1px dashed var(--border)'; st.style.paddingTop='5px';
      st.innerHTML=`<span class="sum-name" style="color:var(--text);font-weight:500">${L('totalLbl')} ${L('cfg')} ${g.group.split(' ').pop()}</span><span></span><span class="sum-price" style="color:var(--accent)">¥${g.total.toLocaleString()}</span>`;
      sumList.appendChild(st);
    }
  });

  const usd = Math.round(grand*k/r);
  document.getElementById('total-cny').textContent = '¥'+grand.toLocaleString();
  document.getElementById('total-usd').textContent = '≈ $'+usd.toLocaleString()+' FOB';
  document.getElementById('total-fob').textContent = `¥${grand.toLocaleString()} × ${k} ÷ ${r} = $${usd.toLocaleString()}`;
}

function setTier(t, btn) {
  tier=t;
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function resetCurrent() {
  const cfg=getCfg();
  cfg.modelQtys={F10:0,F13:0,F15:0}; cfg.selections={};
  renderAll();
}

function toggleSidebar() {
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open',sidebarOpen);
  document.getElementById('sidebar-arrow').textContent=sidebarOpen?'▼':'▲';
}

['rate','fob_k','xkm'].forEach(id=>{
  document.getElementById(id).addEventListener('input',renderAll);
});

renderAll();
</script>
